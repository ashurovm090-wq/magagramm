<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f9; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Шапка как на скрине */
        .header { background: white; padding: 10px; display: flex; align-items: center; border-bottom: 1px solid #ddd; justify-content: space-between; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; background: #eee; border-radius: 50%; overflow: hidden; }
        .avatar img { width: 100%; }

        /* Контейнер сообщений */
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.4; position: relative; }
        
        /* Входящее (белое) */
        .received { align-self: flex-start; background: white; color: #333; border: 1px solid #eee; }
        
        /* Исходящее (оранжевое как на фото) */
        .sent { align-self: flex-end; background: #f3824a; color: white; border-bottom-right-radius: 2px; }

        /* Поле ввода */
        .input-area { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px; outline: none; }
        button { background: #f3824a; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="user-info">
        <div class="avatar"><img src="https://via.placeholder.com/40" alt="avatar"></div>
        <strong>Pieter</strong>
    </div>
</div>

<div class="chat-container">
    <div class="message received">Hello! How may I help you today?</div>
    <div class="message sent">
        Долго мне будут деньги возвращать? Куда будут возвращены денежные средства?
    </div>
</div>

<div class="input-area">
    <input type="text" placeholder="Write a message...">
    <button>➔</button>
</div>

</body>
</html>
