<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magagrame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f1621; color: white; margin: 0; padding: 0; height: 100vh; }
    </style>
</head>
<body>
    <div class="flex flex-col h-full">
        <header class="p-4 bg-[#17212b] border-b border-gray-600">
            <h1 class="font-bold text-lg">Magagrame</h1>
        </header>
        
        <main class="flex-1 p-4 flex flex-col justify-center items-center">
            <div class="bg-[#17212b] p-6 rounded-xl w-full max-w-sm text-center">
                <h2 class="text-xl font-bold mb-2">Привет, {{ username }}!</h2>
                <p class="text-gray-400">Это твой личный профиль.</p>
                <div class="mt-4 p-3 bg-[#242f3d] rounded-lg">
                    <p>Твой ник: <span class="text-blue-400">{{ username }}</span></p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
