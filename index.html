<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f1621; color: white; height: 100vh; display: flex; flex-direction: column; }
        #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 15px; }
        .my-msg { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 4px; }
        .other-msg { align-self: flex-start; background: #242f3d; border-bottom-left-radius: 4px; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="p-4 bg-[#17212b] flex gap-2">
        <input id="msg" class="flex-1 p-2 bg-[#242f3d] rounded" placeholder="Сообщение (кому:текст)...">
        <button onclick="send()" class="bg-blue-600 px-4 rounded font-bold">Отпр.</button>
    </div>

    <script>
        const myName = "{{ username }}";
        const ws = new WebSocket(`wss://${window.location.host}/ws/${myName}`);
        
        ws.onmessage = (e) => {
            const chat = document.getElementById('chat');
            const [sender, ...textParts] = e.data.split(': ');
            const text = textParts.join(': ');
            
            const d = document.createElement('div');
            d.className = `msg-bubble ${sender === myName ? 'my-msg' : 'other-msg'}`;
            d.textContent = text;
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        };

        function send() {
            const m = document.getElementById('msg');
            ws.send(m.value);
            m.value = '';
        }
    </script>
</body>
</html>
