<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fff; display: flex; flex-direction: column; height: 100vh; }
        .hdr { height: 60px; border-bottom: 0.5px solid #c6c6c8; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10; }
        .hdr b { font-size: 17px; }
        .hdr a { color: #007aff; text-decoration: none; font-size: 17px; }
        #msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .m { max-width: 75%; padding: 8px 14px; border-radius: 18px; font-size: 16px; line-height: 1.4; word-wrap: break-word; }
        .in { background: #e9e9eb; align-self: flex-start; color: #000; border-bottom-left-radius: 4px; }
        .out { background: #007aff; align-self: flex-end; color: #fff; border-bottom-right-radius: 4px; }
        .auth { font-size: 11px; margin-bottom: 2px; color: #8e8e93; }
        .inbox { padding: 8px 12px 25px; border-top: 0.5px solid #c6c6c8; display: flex; align-items: center; gap: 8px; }
        input { flex: 1; border: 1px solid #d1d1d6; border-radius: 20px; padding: 10px 15px; font-size: 16px; outline: none; }
        .s-btn { background: #007aff; color: white; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="hdr"><a href="/search">🔍</a><b>Messenger</b><a href="/profile">Профиль</a></div>
    <div id="msgs"></div>
    <div class="inbox">
        <input type="text" id="i" placeholder="Cообщение" onkeypress="if(event.key==='Enter')send()">
        <button class="s-btn" onclick="send()">↑</button>
    </div>
    <script>
        const ws = new WebSocket((window.location.protocol==='https:'?'wss://':'ws://')+window.location.host+'/ws');
        const user = localStorage.getItem('user') || 'User';
        ws.onmessage = e => {
            const data = JSON.parse(e.data);
            const div = document.createElement('div');
            const isMe = data.u === user;
            div.className = 'm ' + (isMe ? 'out' : 'in');
            div.innerHTML = `<div class="auth">${data.u}</div>${data.t}`;
            document.getElementById('msgs').appendChild(div);
            document.getElementById('msgs').scrollTop = 99999;
        };
        function send() {
            const i = document.getElementById('i');
            if(i.value) {
                ws.send(JSON.stringify({u: user, t: i.value}));
                i.value = '';
            }
        }
    </script>
</body>
</html>
