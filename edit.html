<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0e1621] text-white p-6 pb-24">

    <div class="max-w-md mx-auto">
        <h2 class="text-2xl font-bold mb-8 text-center mt-4">Редактировать профиль</h2>
        
        <form action="/update_profile" method="post" class="space-y-6">
            <div>
                <label class="block text-blue-400 text-xs font-bold mb-2 ml-1 uppercase tracking-wider">Имя</label>
                <input name="fullname" value="{{ user['fullname'] }}" class="w-full p-4 bg-[#17212b] rounded-2xl border border-gray-700 focus:border-blue-500 outline-none text-lg">
            </div>

            <div>
                <label class="block text-blue-400 text-xs font-bold mb-2 ml-1 uppercase tracking-wider">О себе</label>
                <textarea name="bio" rows="3" class="w-full p-4 bg-[#17212b] rounded-2xl border border-gray-700 focus:border-blue-500 outline-none text-lg">{{ user['bio'] }}</textarea>
            </div>

            <div>
                <label class="block text-blue-400 text-xs font-bold mb-2 ml-1 uppercase tracking-wider">Дата рождения</label>
                <input name="birthday" type="date" value="{{ user['birthday'] }}" class="w-full p-4 bg-[#17212b] rounded-2xl border border-gray-700 text-white text-lg">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 transition-all p-4 rounded-2xl font-bold text-lg">Сохранить изменения</button>
        </form>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-[#17212b] p-4 flex justify-around border-t border-gray-700 z-50">
        <a href="/" class="text-gray-400 text-sm text-center">💬<br>Чаты</a>
        <a href="/search" class="text-gray-400 text-sm text-center">🔍<br>Поиск</a>
        <a href="/profile" class="text-blue-400 text-sm text-center font-bold">👤<br>Профиль</a>
    </div>

</body>
</html>
