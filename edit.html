<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f1621] text-white p-6">
    <h2 class="text-xl mb-6 font-bold">Редактирование профиля</h2>
    <form action="/update_profile" method="post" class="space-y-4">
        
        <div>
            <label class="text-xs text-gray-500">Username</label>
            <input type="text" value="{{ user['username'] }}" disabled class="w-full p-4 bg-[#242f3d] rounded text-gray-400">
        </div>

        <div>
            <label class="text-xs text-gray-500">ФИО</label>
            <input name="fullname" value="{{ user['fullname'] or '' }}" class="w-full p-4 bg-[#242f3d] rounded text-white">
        </div>

        <div>
            <label class="text-xs text-gray-500">Дата рождения</label>
            <input type="date" name="birthday" value="{{ user['birthday'] or '' }}" class="w-full p-4 bg-[#242f3d] rounded text-white">
        </div>

        <div>
            <label class="text-xs text-gray-500">О себе</label>
            <textarea name="bio" class="w-full p-4 bg-[#242f3d] rounded text-white">{{ user['bio'] or '' }}</textarea>
        </div>

        <button type="submit" class="w-full bg-blue-600 p-4 rounded-xl font-bold">Сохранить</button>
    </form>
</body>
</html>
