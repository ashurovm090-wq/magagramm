<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:#0f1621;color:white;}</style>
</head>
<body class="h-screen flex flex-col">
    <div class="p-4 bg-[#17212b]">
        <input id="search" oninput="doSearch()" class="w-full p-2 bg-[#242f3d] rounded" placeholder="Найти юзера...">
        <div id="results" class="mt-2 space-y-1"></div>
    </div>
    
    <div id="chat" class="flex-1 p-4 overflow-y-auto space-y-2"></div>
    <div class="p-4 bg-[#17212b] flex gap-2">
        <input id="msg" class="flex-1 p-2 bg-[#242f3d] rounded" placeholder="Сообщение...">
        <button onclick="send()" class="bg-blue-600 px-4 rounded">Отпр.</button>
    </div>

    <script>
        const myName = "{{ username }}";
        const ws = new WebSocket(`wss://${window.location.host}/ws/${myName}`);
        
        ws.onmessage = (e) => {
            const d = document.createElement('div');
            d.textContent = e.data;
            document.getElementById('chat').appendChild(d);
        };

        async function doSearch() {
            const q = document.getElementById('search').value;
            const res = await (await fetch(`/search?query=${q}`)).json();
            const rDiv = document.getElementById('results');
            rDiv.innerHTML = '';
            res.users.forEach(u => {
                const b = document.createElement('div');
                b.className = "text-blue-400 cursor-pointer";
                b.textContent = "@" + u;
                b.onclick = () => { document.getElementById('msg').value = u + ":"; };
                rDiv.appendChild(b);
            });
        }

        function send() {
            const m = document.getElementById('msg');
            ws.send(m.value); m.value = '';
        }
    </script>
</body>
</html>
