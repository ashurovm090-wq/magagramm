<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чаты</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; margin: 0; padding-top: 130px; }
        .hdr { position: fixed; top: 0; left: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); border-bottom: 0.5px solid #c6c6c8; z-index: 10; padding: 10px 0; }
        .top { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; margin-bottom: 12px; }
        .ava { width: 34px; height: 34px; border-radius: 50%; background: #e5e5ea; display: flex; align-items: center; justify-content: center; text-decoration: none; color: #007aff; font-weight: 600; }
        .title { font-weight: 700; font-size: 20px; }
        .search-box { padding: 0 16px; }
        input { width: 100%; padding: 10px 12px; border-radius: 10px; border: none; background: #f2f2f7; font-size: 17px; outline: none; }
        .list { list-style: none; padding: 0; margin: 0; }
        .item { display: flex; align-items: center; padding: 12px 16px; text-decoration: none; color: #000; border-bottom: 0.5px solid #e5e5ea; }
        .item:active { background: #f2f2f7; }
        .c-ava { width: 52px; height: 52px; border-radius: 50%; background: #007aff; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 15px; }
        .c-info { flex: 1; }
        .c-name { font-weight: 600; font-size: 17px; }
        .c-msg { color: #8e8e93; font-size: 14px; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="hdr">
        <div class="top">
            <a href="/profile" class="ava" id="myAva">?</a>
            <div class="title">Messenger</div>
            <div style="width:34px"></div>
        </div>
        <div class="search-box">
            <input type="text" placeholder="Поиск">
        </div>
    </div>
    <div class="list">
        <a href="/chat" class="item">
            <div class="c-ava">#</div>
            <div class="c-info">
                <div class="c-name">Общий канал</div>
                <div class="c-msg">Нажми, чтобы начать общение...</div>
            </div>
        </a>
    </div>
    <script>
        const u = localStorage.getItem('user') || 'U';
        document.getElementById('myAva').textContent = u[0].toUpperCase();
    </script>
</body>
</html>
