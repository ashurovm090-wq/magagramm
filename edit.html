<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><title>Редактировать профиль</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F5F5F7; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0 20px; border: 1px solid #d2d2d7; border-radius: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0071e3; color: white; border: none; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Редактировать профиль</h3>
        <label>Имя</label><input type="text" id="n">
        <label>Отчество</label><input type="text" id="p">
        <label>О себе</label><textarea id="b" rows="4"></textarea>
        <button onclick="save()">Сохранить</button>
    </div>
    <script>
        function save() {
            localStorage.setItem('user', document.getElementById('n').value);
            localStorage.setItem('bio', document.getElementById('b').value);
            location.href = '/profile';
        }
    </script>
</body>
</html>
