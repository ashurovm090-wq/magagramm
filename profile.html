<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: #fff; width: 90%; max-width: 350px; border-radius: 20px; padding: 25px; text-align: center; }
        .av { width: 100px; height: 100px; background: #e5e5ea; border-radius: 50%; margin: 0 auto 20px; }
        h2 { margin: 0; font-size: 24px; }
        p { color: #8e8e93; margin: 8px 0 25px; }
        a { display: block; padding: 12px; background: #f2f2f7; color: #007aff; text-decoration: none; border-radius: 12px; margin-bottom: 10px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <div class="av"></div>
        <h2 id="n">Username</h2>
        <p id="b">О себе не заполнено</p>
        <a href="/edit">Редактировать</a>
        <a href="/chat" style="background: #007aff; color: #fff;">В чат</a>
    </div>
    <script>
        document.getElementById('n').textContent = localStorage.getItem('user');
        document.getElementById('b').textContent = localStorage.getItem('bio') || 'О себе не заполнено';
    </script>
</body>
</html>
