<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><title>Поиск</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: white; padding: 20px; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #d2d2d7; background: #F5F5F7; outline: none; }
        .res { margin-top: 20px; border-bottom: 1px solid #e5e5e5; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <a href="/chat" style="text-decoration:none; color:#0071e3;">← Назад</a>
    <h2 style="margin-top:20px;">Поиск</h2>
    <input type="text" placeholder="Введите username..." oninput="search(this.value)">
    <div id="results"></div>
    <script>
        function search(v) {
            const r = document.getElementById('results');
            r.innerHTML = v ? `<div class="res">Пользователь: <b>${v}</b> (Нажмите, чтобы открыть)</div>` : '';
        }
    </script>
</body>
</html>
