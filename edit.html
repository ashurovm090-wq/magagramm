<body class="bg-[#0f1621] text-white p-6">
    <h2 class="text-xl mb-6">Редактировать</h2>
    <form action="/update_profile" method="post" class="space-y-4">
        <input name="fullname" value="{{ user[1] }}" class="w-full p-3 bg-[#242f3d] rounded">
        <input name="bio" value="{{ user[2] }}" class="w-full p-3 bg-[#242f3d] rounded">

    </form>
</body>
