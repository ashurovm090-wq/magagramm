<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #fff; }
        input { width: 100%; background: #f2f2f7; border: none; padding: 15px; border-radius: 12px; font-size: 17px; outline: none; }
        .item { margin-top: 20px; padding: 15px; background: #f2f2f7; border-radius: 12px; font-weight: 500; }
    </style>
</head>
<body>
    <a href="/chat" style="color:#007aff; text-decoration:none; font-size:17px;">← Назад</a>
    <h1 style="font-size:34px; letter-spacing:-1px;">Поиск</h1>
    <input type="text" placeholder="Поиск по юзернейму" oninput="show(this.value)">
    <div id="res"></div>
    <script>
        function show(v) {
            document.getElementById('res').innerHTML = v ? `<div class="item">Пользователь: ${v}</div>` : '';
        }
    </script>
</body>
</html>
