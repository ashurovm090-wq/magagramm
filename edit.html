<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f1621] text-white p-6">
    <h2 class="text-xl font-bold mb-6 text-center">Редактирование профиля</h2>
    <form action="/update_profile" method="post" class="space-y-4">
        <input name="fullname" value="{{ user['fullname'] }}" placeholder="Имя" class="w-full p-3 bg-[#242f3d] rounded-xl border border-gray-700">
        <input name="bio" value="{{ user['bio'] }}" placeholder="О себе" class="w-full p-3 bg-[#242f3d] rounded-xl border border-gray-700">
        <input name="birthday" type="date" value="{{ user['birthday'] }}" class="w-full p-3 bg-[#242f3d] rounded-xl border border-gray-700 text-white">
        <button type="submit" class="w-full bg-blue-600 p-4 rounded-xl font-bold">Сохранить</button>
    </form>
</body>
</html>
