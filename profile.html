<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <style>
        :root { --primary-orange: #f3824a; }
        body { font-family: sans-serif; background: #f4f7f9; margin: 0; text-align: center; }
        
        .profile-container { padding-top: 50px; }
        .big-avatar { 
            width: 120px; height: 120px; background: white; border-radius: 50%; 
            margin: 0 auto 20px; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .username { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        .bio { color: #777; margin-bottom: 30px; }
        
        .edit-link { 
            display: inline-block; padding: 10px 30px; background: var(--primary-orange); 
            color: white; text-decoration: none; border-radius: 25px; font-weight: bold;
        }

        .tab-bar { height: 60px; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; }
        .tab-item { text-align: center; color: #888; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; }
        .active { color: var(--primary-orange); }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="big-avatar"></div>
    <div class="username">Мухаммад Ашуров</div>
    <div class="bio">ashurovm090@gmail.com</div>
    
    <a href="/edit" class="edit-link">Редактировать</a>
</div>

<nav class="tab-bar">
    <a href="/chat" class="tab-item"><span>💬</span><span>Чаты</span></a>
    <a href="/search" class="tab-item"><span>🔍</span><span>Поиск</span></a>
    <a href="/profile" class="tab-item active"><span>👤</span><span>Профиль</span></a>
</nav>

</body>
</html>
