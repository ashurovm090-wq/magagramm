<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger</title>
    <style>
        :root {
            --primary-orange: #f3824a; /* Тот самый оранжевый */
            --bg-gray: #f4f7f9;
            --text-dark: #333;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }
        
        /* Шапка */
        .header { 
            background: white; 
            padding: 10px 15px; 
            display: flex; 
            align-items: center; 
            border-bottom: 1px solid #e0e0e0; 
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 35px; height: 35px; background: #ddd; border-radius: 50%; }
        .status-dot { width: 10px; height: 10px; background: #4caf50; border: 2px solid white; border-radius: 50%; position: absolute; bottom: 0; right: 0; }
        .avatar-container { position: relative; }

        /* Контейнер сообщений */
        .chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            padding-bottom: 80px; /* Чтобы сообщения не перекрывались полем ввода */
        }
        
        .message { 
            max-width: 75%; 
            padding: 10px 14px; 
            border-radius: 18px; 
            font-size: 15px; 
            line-height: 1.4; 
        }
        
        .received { 
            align-self: flex-start; 
            background: white; 
            color: var(--text-dark); 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            border-bottom-left-radius: 4px;
        }
        
        .sent { 
            align-self: flex-end; 
            background: var(--primary-orange); 
            color: white; 
            border-bottom-right-radius: 4px;
        }

        /* Поле ввода (фиксированное над таб-баром) */
        .input-area { 
            background: white; 
            padding: 10px; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #eee;
            position: absolute;
            bottom: 60px; /* Высота таб-бара */
            width: 100%;
            box-sizing: border-box;
        }
        .input-area input { 
            flex: 1; 
            border: 1px solid #eee; 
            border-radius: 20px; 
            padding: 8px 15px; 
            background: #f9f9f9;
            outline: none; 
        }

        /* ТАБ-БАР (НИЖНЯЯ НАВИГАЦИЯ) */
        .tab-bar {
            height: 60px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: absolute;
            bottom: 0;
            width: 100%;
        }
        .tab-item {
            text-align: center;
            color: #888;
            text-decoration: none;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .tab-item.active {
            color: var(--primary-orange);
        }
        .tab-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="user-info">
        <div class="avatar-container">
            <div class="avatar"></div>
            <div class="status-dot"></div>
        </div>
        <strong>Pieter</strong>
    </div>
</div>

<div class="chat-container">
    <div class="message received">Hello! How may I help you today?</div>
    <div class="message sent">Привет! Вот так теперь выглядит наш чат с оранжевым дизайном.</div>
    <div class="message received">Выглядит круто. Вкладки снизу теперь работают?</div>
</div>

<div class="input-area">
    <input type="text" placeholder="Сообщение...">
    <div style="color: var(--primary-orange); font-size: 24px; padding-right: 5px;">➔</div>
</div>

<nav class="tab-bar">
    <a href="/chat" class="tab-item active">
        <span class="tab-icon">💬</span>
        <span>Чаты</span>
    </a>
    <a href="/search" class="tab-item">
        <span class="tab-icon">🔍</span>
        <span>Поиск</span>
    </a>
    <a href="/profile" class="tab-item">
        <span class="tab-icon">👤</span>
        <span>Профиль</span>
    </a>
</nav>

</body>
</html>
