<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><title>Вход</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F5F5F7; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #d2d2d7; border-radius: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0071e3; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 500; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Messenger</h2>
        <input type="text" placeholder="Username" id="u">
        <button onclick="localStorage.setItem('user', document.getElementById('u').value); location.href='/chat'">Войти</button>
    </div>
</body>
</html>
