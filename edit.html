<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; padding: 20px; }
        h3 { font-size: 28px; letter-spacing: -0.5px; }
        label { display: block; color: #8e8e93; font-size: 13px; text-transform: uppercase; margin: 20px 0 8px 5px; }
        input, textarea { width: 100%; border: 1px solid #e5e5ea; background: #f2f2f7; padding: 15px; border-radius: 12px; font-size: 17px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 16px; background: #007aff; color: #fff; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; margin-top: 30px; }
    </style>
</head>
<body>
    <h3>Профиль</h3>
    <label>Имя пользователя</label><input type="text" id="un">
    <label>О себе</label><textarea id="bio" rows="4"></textarea>
    <button onclick="save()">Сохранить</button>
    <script>
        document.getElementById('un').value = localStorage.getItem('user');
        document.getElementById('bio').value = localStorage.getItem('bio') || '';
        function save() {
            localStorage.setItem('user', document.getElementById('un').value);
            localStorage.setItem('bio', document.getElementById('bio').value);
            location.href = '/profile';
        }
    </script>
</body>
</html>
