<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:#0f1621;color:white;}</style>
</head>
<body class="h-screen flex flex-col">
    <div id="results" class="flex-1 p-4 space-y-2"></div>
    
    <div class="p-4 bg-[#17212b] border-t border-gray-700">
        <input id="search" oninput="doSearch()" class="w-full p-2 bg-[#242f3d] rounded" placeholder="Поиск пользователей...">
    </div>
    
    <nav class="p-4 flex justify-around bg-[#17212b]">
        <a href="/">💬 Чаты</a>
        <a href="/profile">👤 Профиль</a>
    </nav>

    <script>
        async function doSearch() {
            const query = document.getElementById('search').value;
            if (query.length < 2) return;
            const res = await fetch(`/search?query=${query}`);
            const data = await res.json();
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = '';
            data.users.forEach(u => {
                const btn = document.createElement('div');
                btn.className = "p-3 bg-[#242f3d] rounded cursor-pointer";
                btn.textContent = u;
                btn.onclick = () => alert("Открываем чат с " + u);
                resDiv.appendChild(btn);
            });
        }
    </script>
</body>
</html>
