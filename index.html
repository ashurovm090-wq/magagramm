<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вход</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { width: 85%; max-width: 320px; text-align: center; }
        h1 { font-size: 34px; font-weight: 700; letter-spacing: -1px; margin-bottom: 40px; }
        input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #e5e5ea; background: #f2f2f7; font-size: 17px; box-sizing: border-box; outline: none; }
        input:focus { background: #fff; border-color: #007aff; }
        button { width: 100%; padding: 16px; background: #007aff; color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Messenger</h1>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button onclick="login()">Войти</button>
    </div>
    <script>
        function login() {
            const u = document.getElementById('u').value;
            if(u) {
                localStorage.setItem('user', u);
                location.href = '/chats';
            }
        }
    </script>
</body>
</html>
