<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagaGramm</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding-top: 130px; }
        .hdr { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); border-bottom: 0.5px solid #ccc; z-index: 10; padding: 10px 0; }
        .top { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; margin-bottom: 10px; }
        .ava { width: 36px; height: 36px; border-radius: 50%; background: #f2f2f7; display: flex; align-items: center; justify-content: center; text-decoration: none; color: #007aff; font-weight: bold; }
        input { width: 92%; margin: 0 4%; padding: 10px; border-radius: 10px; border: none; background: #f2f2f7; outline: none; }
        .item { display: flex; align-items: center; padding: 12px 16px; text-decoration: none; color: #000; border-bottom: 0.5px solid #eee; }
        .c-ava { width: 50px; height: 50px; border-radius: 50%; background: #007aff; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 15px; }
    </style>
</head>
<body>
    <div class="hdr">
        <div class="top"><a href="/profile" class="ava" id="myAva">?</a><b style="font-size: 20px;">MagaGramm</b><div style="width:36px"></div></div>
        <input type="text" placeholder="Поиск..." oninput="search(this.value)">
    </div>
    <div id="list"></div>
    <script>
        const myUser = localStorage.getItem('user');
        if(!myUser) location.href = '/';
        document.getElementById('myAva').textContent = myUser[0].toUpperCase();
        async function load() {
            const r = await fetch('/api/users');
            const users = await r.json();
            const list = document.getElementById('list');
            list.innerHTML = '';
            users.forEach(u => {
                if(u === myUser) return;
                list.innerHTML += `<a href="/chat?with=${u}" class="item"><div class="c-ava">${u[0].toUpperCase()}</div><div><b>${u}</b><div style="color:gray;font-size:14px">Написать...</div></div></a>`;
            });
        }
        load();
        function search(v) {
            document.querySelectorAll('.item').forEach(i => i.style.display = i.innerText.toLowerCase().includes(v.toLowerCase()) ? 'flex' : 'none');
        }
    </script>
</body>
</html>
