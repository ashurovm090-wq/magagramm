<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magagrame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f1621; color: white; margin: 0; padding: 0; height: 100vh; }
    </style>
</head>
<body>
    <div class="flex flex-col h-screen">
        <header class="p-4 bg-[#17212b] border-b border-gray-700 flex justify-between items-center">
            <h1 class="font-bold">Magagrame</h1>
            <a href="/profile" class="text-xs text-blue-400">Профиль</a>
        </header>
        
        <main class="flex-1 p-4 overflow-y-auto">
            <div id="messages" class="space-y-4">
                <p class="text-gray-500 text-center">Привет, {{ username }}! Чат пока пуст.</p>
            </div>
        </main>

        <div class="p-3 bg-[#17212b] border-t border-gray-700">
            <input type="text" placeholder="Сообщение..." class="w-full p-2 bg-[#242f3d] rounded-lg text-white">
        </div>
    </div>
</body>
</html>
