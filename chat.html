<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><title>Чат</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; }
        .side { width: 280px; background: #F5F5F7; border-right: 1px solid #d2d2d7; display: flex; flex-direction: column; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 15px 20px; border-bottom: 1px solid #d2d2d7; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .m { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 15px; }
        .in { background: #E9E9EB; align-self: flex-start; }
        .out { background: #0071e3; color: white; align-self: flex-end; }
        .inp-area { padding: 20px; border-top: 1px solid #d2d2d7; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #d2d2d7; outline: none; }
        .nav-btn { text-decoration: none; color: #0071e3; font-size: 14px; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="side">
        <div class="header">Чаты <a href="/search" class="nav-btn">Поиск</a></div>
        <div style="padding: 20px; color: #86868b;">Общий чат</div>
    </div>
    <div class="main">
        <div class="header">Общий канал <a href="/profile" class="nav-btn">Профиль</a></div>
        <div id="msgs"></div>
        <div class="inp-area">
            <input type="text" id="i" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" style="background:none; border:none; color:#0071e3; font-size:24px; cursor:pointer;">↑</button>
        </div>
    </div>
    <script>
        const ws = new WebSocket((window.location.protocol==='https:'?'wss://':'ws://')+window.location.host+'/ws');
        const user = localStorage.getItem('user') || 'Аноним';
        ws.onmessage = e => {
            const div = document.createElement('div');
            const isMe = e.data.startsWith(user + ":");
            div.className = 'm ' + (isMe ? 'out' : 'in');
            div.textContent = e.data;
            document.getElementById('msgs').appendChild(div);
            document.getElementById('msgs').scrollTop = 99999;
        };
        function send() {
            const i = document.getElementById('i');
            if(i.value) { ws.send(user + ": " + i.value); i.value = ''; }
        }
    </script>
</body>
</html>
