<body class="bg-[#0f1621] text-white p-6">
    <h2 class="text-xl mb-6 font-bold">Редактирование</h2>
    <form action="/update_profile" method="post" class="space-y-4">
        <div>
            <label class="text-xs text-gray-500">Username (нельзя менять)</label>
            <input type="text" value="{{ user.username }}" disabled class="w-full p-4 bg-[#242f3d] rounded text-gray-400">
        </div>
        <div>
            <label class="text-xs text-gray-500">ФИО</label>
            <input name="fullname" value="{{ user.fullname or '' }}" class="w-full p-4 bg-[#242f3d] rounded text-white border border-gray-600 focus:border-blue-500 outline-none">
        </div>
        <div>
            <label class="text-xs text-gray-500">О себе</label>
            <textarea name="bio" class="w-full p-4 bg-[#242f3d] rounded text-white h-24">{{ user.bio or '' }}</textarea>
        </div>
        <button type="submit" class="w-full bg-blue-600 p-4 rounded-xl font-bold text-lg mt-4">Сохранить изменения</button>
    </form>
</body>
