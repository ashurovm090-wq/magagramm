<script src="https://cdn.tailwindcss.com"></script>
<body class="bg-[#0f1621] text-white p-6">
    <form action="/update" method="post" class="space-y-4">
        <input name="fullname" value="{{ user['fullname'] }}" class="w-full p-3 bg-[#242f3d] rounded">
        <input name="birthday" type="date" value="{{ user['birthday'] }}" class="w-full p-3 bg-[#242f3d] rounded">
        <textarea name="bio" class="w-full p-3 bg-[#242f3d] rounded">{{ user['bio'] or '' }}</textarea>
        <button type="submit" class="w-full bg-blue-600 p-3 rounded">Сохранить</button>
    </form>
</body>
