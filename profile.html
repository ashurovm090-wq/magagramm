<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><title>Профиль</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F5F5F7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; width: 300px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .avatar { width: 80px; height: 80px; background: #e5e5e5; border-radius: 50%; margin: 0 auto 15px; }
        .btn { display: block; margin-top: 15px; text-decoration: none; color: #0071e3; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar"></div>
        <h2 id="name">Загрузка...</h2>
        <p id="bio" style="color:#86868b">О себе не заполнено</p>
        <a href="/edit" class="btn">Редактировать</a>
        <a href="/chat" class="btn" style="color: #86868b">Назад</a>
    </div>
    <script>
        document.getElementById('name').textContent = localStorage.getItem('user') || 'User';
        if(localStorage.getItem('bio')) document.getElementById('bio').textContent = localStorage.getItem('bio');
    </script>
</body>
</html>
